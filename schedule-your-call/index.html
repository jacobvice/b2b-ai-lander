<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page Starter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #f5f7fa;
      background-color: #02060d;
      background-image:
        radial-gradient(ellipse at center, rgba(9, 32, 56, 0.5) 0%, rgba(2, 6, 13, 0.96) 62%),
        radial-gradient(circle at 75% 38%, rgba(26, 118, 179, 0.28) 0%, rgba(26, 118, 179, 0) 34%),
        radial-gradient(circle at 84% 52%, rgba(16, 81, 128, 0.2) 0%, rgba(16, 81, 128, 0) 32%),
        linear-gradient(rgba(0, 0, 0, 0.34) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.34) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      background-position: center, center, center, center, center;
      background-attachment: fixed;
      display: grid;
      place-items: start center;
      padding: 40px 16px;
    }

    .hero {
      width: min(100%, 760px);
      text-align: center;
    }

    h1 {
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      text-wrap: balance;
      margin-top: 0;
    }

    .calendly-inline-widget {
      margin-top: 20px;
    }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    @media (max-width: 600px) {
      .hero {
        width: 100%;
      }

      h1 {
        white-space: nowrap;
        font-size: clamp(13px, 4.6vw, 20px);
        letter-spacing: -0.01em;
        text-wrap: nowrap;
      }
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>
  <main class="hero">
    <h1>→ NEXT STEP: Schedule In Your Call ←</h1>
    <!-- Calendly inline widget begin -->
    <div class="calendly-inline-widget" data-url="https://calendly.com/alex-lee-deal-closer/revenue-diagnostic?hide_event_type_details=1&hide_gdpr_banner=1" style="min-width:320px;height:700px;"></div>
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
    <!-- Calendly inline widget end -->
  </main>
  <script>
    (function () {
      const canvas = document.getElementById("confetti-canvas");
      const ctx = canvas.getContext("2d");
      const pieces = [];
      const colors = ["#2f9fd4", "#1f7ba7", "#5de2b0", "#ffffff", "#7bd3ff"];
      const totalPieces = 140;
      const durationMs = 1000;
      let startTime = 0;

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function createPieces() {
        pieces.length = 0;
        for (let i = 0; i < totalPieces; i += 1) {
          pieces.push({
            x: random(0, canvas.width),
            y: random(-canvas.height * 0.4, 0),
            w: random(5, 10),
            h: random(8, 16),
            vx: random(-2.2, 2.2),
            vy: random(4.2, 8.2),
            rot: random(0, Math.PI * 2),
            vr: random(-0.2, 0.2),
            color: colors[Math.floor(Math.random() * colors.length)],
            alpha: random(0.7, 1),
          });
        }
      }

      function drawPiece(piece) {
        ctx.save();
        ctx.globalAlpha = piece.alpha;
        ctx.translate(piece.x, piece.y);
        ctx.rotate(piece.rot);
        ctx.fillStyle = piece.color;
        ctx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
        ctx.restore();
      }

      function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        pieces.forEach(function (piece) {
          piece.x += piece.vx;
          piece.y += piece.vy;
          piece.rot += piece.vr;
          piece.vy += 0.03;
          drawPiece(piece);
        });

        if (elapsed < durationMs) {
          requestAnimationFrame(animate);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          canvas.remove();
        }
      }

      resizeCanvas();
      createPieces();
      window.addEventListener("resize", resizeCanvas);
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
