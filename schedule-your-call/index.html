<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page Starter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #f5f7fa;
      background-color: #02060d;
      background-image:
        radial-gradient(ellipse at center, rgba(9, 32, 56, 0.5) 0%, rgba(2, 6, 13, 0.96) 62%),
        radial-gradient(circle at 75% 38%, rgba(26, 118, 179, 0.28) 0%, rgba(26, 118, 179, 0) 34%),
        radial-gradient(circle at 84% 52%, rgba(16, 81, 128, 0.2) 0%, rgba(16, 81, 128, 0) 32%),
        linear-gradient(rgba(0, 0, 0, 0.34) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.34) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      background-position: center, center, center, center, center;
      background-attachment: fixed;
      display: grid;
      place-items: start center;
      padding: 40px 16px;
    }

    .hero {
      width: min(100%, 760px);
      text-align: center;
    }

    h1 {
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      text-wrap: balance;
      margin-top: 0;
    }

    .calendly-inline-widget {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1>→ NEXT STEP: Schedule In Your Call ←</h1>
    <!-- Calendly inline widget begin -->
    <div class="calendly-inline-widget" data-url="https://calendly.com/alex-lee-deal-closer/revenue-diagnostic?hide_event_type_details=1&hide_gdpr_banner=1" style="min-width:320px;height:700px;"></div>
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
    <!-- Calendly inline widget end -->
  </main>
</body>
</html>
